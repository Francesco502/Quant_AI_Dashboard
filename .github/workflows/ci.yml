name: CI - Run Tests with Coverage

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:
    branches:
      - main
      - develop

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend lint
        working-directory: web
        run: npm run lint -- --max-warnings=0

      - name: Run frontend build
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-cov pytest-mock pytest-asyncio pytest-timeout pytest-benchmark

      - name: Verify Python source compilation
        run: |
          python -m compileall -q api core tests

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -v --cov=core --cov=api --cov-report=xml --cov-report=html

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ -m "e2e_inprocess" -v --timeout=120

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-coverage
          fail_ci_if_error: false

      - name: Upload coverage report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  release-validation:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-timeout requests playwright
          python -m playwright install --with-deps chromium

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Start backend service
        run: |
          nohup uvicorn api.main:app --host 127.0.0.1 --port 8685 > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Start frontend service
        working-directory: web
        run: |
          nohup npm run dev > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Wait for services
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8685/api/health >/dev/null && curl -fsS http://127.0.0.1:8686/login >/dev/null; then
              echo "Services are up"
              exit 0
            fi
            sleep 2
          done
          echo "Services failed to start"
          echo "==== backend.log ===="
          cat backend.log || true
          echo "==== frontend.log ===="
          cat frontend.log || true
          exit 1

      - name: Run external release validation tests
        env:
          RUN_EXTERNAL_E2E: "1"
          API_URL: "http://127.0.0.1:8685/api"
          FRONTEND_URL: "http://127.0.0.1:8686"
        run: |
          python -m pytest tests/e2e/test_release_validation.py -o addopts="--strict-markers --tb=short --disable-warnings" -m "e2e_external" -v --timeout=180

      - name: Upload release validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-logs
          path: |
            backend.log
            frontend.log
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          if [ -f backend.pid ]; then kill $(cat backend.pid) || true; fi
          if [ -f frontend.pid ]; then kill $(cat frontend.pid) || true; fi

  test-performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-timeout pytest-benchmark

      - name: Run performance benchmarks
        run: |
          python -m pytest tests/performance/ -v --benchmark-storage=./benchmarks/

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: ./benchmarks/
          retention-days: 7
