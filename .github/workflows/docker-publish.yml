name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Container image tag to publish"
        required: true
        default: "v2.4.0"
      push_latest:
        description: "Also publish the latest tag"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push release image
        env:
          IMAGE: ghcr.io/francesco502/quant_ai_dashboard
          VERSION_TAG: ${{ inputs.tag }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          set -euo pipefail

          tags="-t ${IMAGE}:${VERSION_TAG}"
          if [ "${PUSH_LATEST}" = "true" ]; then
            tags="${tags} -t ${IMAGE}:latest"
          fi

          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.optimized \
            ${tags} \
            --push \
            .
