# ============================================================
# Quant-AI Dashboard v3.0.0 — 单容器部署（与 docker-compose.yml 相同）
# 此文件保留作为参考，实际部署直接使用 docker-compose.yml
# ============================================================

services:
  quant-app:
    image: francescoli/quant_app:v3.0.0
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: quant-app
    ports:
      - "8686:80"
      - "8685:8685"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./strategies:/app/strategies
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - DISABLE_HEAVY_MODELS=true
      - ENABLE_DAEMON=true
      - SECRET_KEY=${SECRET_KEY:-quant-ai-dashboard-secret-key-change-me}
      - APP_LOGIN_PASSWORD=${APP_LOGIN_PASSWORD:-}
      - APP_LOGIN_PASSWORD_HASH=${APP_LOGIN_PASSWORD_HASH:-}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8686}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1800M
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
