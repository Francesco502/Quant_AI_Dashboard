# ============================================================
# Quant-AI Dashboard v2.0.0 — 单容器部署（2核2GB 专用）
#
# 架构：1 个容器内用 Supervisor 管理 Nginx + Uvicorn + Daemon
#   - Nginx    : 托管前端静态文件 + 反向代理 API/WS（端口 80）
#   - Uvicorn  : FastAPI 单 worker（端口 8685，内部）
#   - Daemon   : 定时数据更新 / 模型训练（可选，ENABLE_DAEMON 控制）
#
# 使用：
#   docker-compose up -d            # 启动
#   docker-compose logs -f          # 查看日志
#   docker-compose down             # 停止
# ============================================================

services:
  quant-app:
    image: francescoli/quant_app:v2.0.0
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: quant-app
    ports:
      - "8686:80"     # 统一入口（Nginx）
      - "8685:8685"   # 后端 API（可选，调试用）
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./strategies:/app/strategies
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      # ---- 低配优化 ----
      - DISABLE_HEAVY_MODELS=true
      - ENABLE_DAEMON=true
      # ---- 认证 ----
      - SECRET_KEY=${SECRET_KEY:-quant-ai-dashboard-secret-key-change-me}
      - APP_LOGIN_PASSWORD=${APP_LOGIN_PASSWORD:-}
      - APP_LOGIN_PASSWORD_HASH=${APP_LOGIN_PASSWORD_HASH:-}
      # ---- 数据源 ----
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
      # ---- CORS ----
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8686}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1800M
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
