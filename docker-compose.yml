services:
  quant-app:
    image: francescoli/quant_app:v3.0.0
    build:
      context: .
      dockerfile: Dockerfile.optimized
      args:
        INSTALL_NATIVE_KERNEL: "${INSTALL_NATIVE_KERNEL:-false}"
    container_name: quant-app
    ports:
      - "8686:80"
      - "8685:8685"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./strategies:/app/strategies
      - ./models:/app/models
    environment:
      PYTHONUNBUFFERED: "1"
      DISABLE_HEAVY_MODELS: "true"
      TZ: "${TZ:-Asia/Shanghai}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Shanghai}"
      ENABLE_DAEMON: "${ENABLE_DAEMON:-true}"
      API_EXPECT_SAME_ORIGIN: "${API_EXPECT_SAME_ORIGIN:-true}"
      SECRET_KEY: "${SECRET_KEY:-quant-ai-dashboard-secret-key-change-me}"
      APP_LOGIN_PASSWORD: "${APP_LOGIN_PASSWORD:-}"
      APP_LOGIN_PASSWORD_HASH: "${APP_LOGIN_PASSWORD_HASH:-}"
      ALPHA_VANTAGE_KEY: "${ALPHA_VANTAGE_KEY:-}"
      TUSHARE_TOKEN: "${TUSHARE_TOKEN:-}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8686}"
      LLM_PROVIDER: "${LLM_PROVIDER:-openai_compat}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DS_API_KEY: "${DS_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-v4-flash}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.deepseek.com}"
      OPENAI_MODEL: "${OPENAI_MODEL:-deepseek-v4-flash}"
      SCAN_TASK_EXECUTION_MODE: "${SCAN_TASK_EXECUTION_MODE:-external_worker}"
      BACKTEST_TASK_EXECUTION_MODE: "${BACKTEST_TASK_EXECUTION_MODE:-external_worker}"
      PREDICTION_TASK_EXECUTION_MODE: "${PREDICTION_TASK_EXECUTION_MODE:-inline}"
      MARKET_REFRESH_TASK_EXECUTION_MODE: "${MARKET_REFRESH_TASK_EXECUTION_MODE:-inline}"
      WORKER_HEARTBEAT_DIR: "${WORKER_HEARTBEAT_DIR:-/app/data/worker_heartbeats}"
      FEATURE_SNAPSHOT_DIR: "${FEATURE_SNAPSHOT_DIR:-/app/data/feature_snapshots}"
      QUANT_NATIVE_KERNEL: "${QUANT_NATIVE_KERNEL:-auto}"
      ARK_API_KEY: "${ARK_API_KEY:-}"
      ARK_BASE_URL: "${ARK_BASE_URL:-}"
      ARK_MODEL: "${ARK_MODEL:-}"
      VOLCENGINE_API_KEY: "${VOLCENGINE_API_KEY:-}"
      VOLCENGINE_ARK_API_KEY: "${VOLCENGINE_ARK_API_KEY:-}"
      VOLCENGINE_BASE_URL: "${VOLCENGINE_BASE_URL:-}"
      VOLCENGINE_MODEL: "${VOLCENGINE_MODEL:-}"
      DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY:-}"
      DASHSCOPE_BASE_URL: "${DASHSCOPE_BASE_URL:-}"
      DASHSCOPE_MODEL: "${DASHSCOPE_MODEL:-}"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1800M
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
