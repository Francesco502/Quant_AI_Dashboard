services:
  quant-app:
    image: francescoli/quant_app:v2.1.4
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: quant-app
    ports:
      - "8686:80"
      - "8685:8685"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./strategies:/app/strategies
      - ./models:/app/models
    environment:
      PYTHONUNBUFFERED: "1"
      DISABLE_HEAVY_MODELS: "true"
      TZ: "${TZ:-Asia/Shanghai}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Shanghai}"
      ENABLE_DAEMON: "${ENABLE_DAEMON:-true}"
      API_EXPECT_SAME_ORIGIN: "${API_EXPECT_SAME_ORIGIN:-true}"
      SECRET_KEY: "${SECRET_KEY:-quant-ai-dashboard-secret-key-change-me}"
      APP_LOGIN_PASSWORD: "${APP_LOGIN_PASSWORD:-}"
      APP_LOGIN_PASSWORD_HASH: "${APP_LOGIN_PASSWORD_HASH:-}"
      ALPHA_VANTAGE_KEY: "${ALPHA_VANTAGE_KEY:-}"
      TUSHARE_TOKEN: "${TUSHARE_TOKEN:-}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8686}"
      LLM_PROVIDER: "${LLM_PROVIDER:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      ARK_API_KEY: "${ARK_API_KEY:-}"
      ARK_BASE_URL: "${ARK_BASE_URL:-}"
      ARK_MODEL: "${ARK_MODEL:-}"
      VOLCENGINE_API_KEY: "${VOLCENGINE_API_KEY:-}"
      VOLCENGINE_ARK_API_KEY: "${VOLCENGINE_ARK_API_KEY:-}"
      VOLCENGINE_BASE_URL: "${VOLCENGINE_BASE_URL:-}"
      VOLCENGINE_MODEL: "${VOLCENGINE_MODEL:-}"
      DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY:-}"
      DASHSCOPE_BASE_URL: "${DASHSCOPE_BASE_URL:-}"
      DASHSCOPE_MODEL: "${DASHSCOPE_MODEL:-}"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1800M
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
