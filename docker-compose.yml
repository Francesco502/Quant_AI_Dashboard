version: '3.8'

services:
  # Dashboard 服务（Streamlit Web 界面）
  dashboard:
    image: francescoli/quant_ai_dashboard:v0.1.4
    container_name: quant-dashboard
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      # 本地数据仓库（持久化）
      - ./data:/app/data
      # 配置文件（持久化）
      - ./daemon_config.json:/app/daemon_config.json
      - ./daemon_status.json:/app/daemon_status.json
      # 日志目录（持久化）
      - ./logs:/app/logs
      # 用户状态和模拟账户（持久化，确保主题配置一致）
      # 注意：挂载 .streamlit 目录会覆盖镜像中的配置，确保使用本地主题配置（蓝色主题）
      - ./.streamlit:/app/.streamlit
      # 如果选股功能在Docker中不工作，可以取消下面的注释以挂载本地配置
      # 注意：这会覆盖镜像中的代码，仅在需要自定义配置时使用
      # - ./core/stocktradebyz:/app/core/stocktradebyz
    environment:
      - PYTHONUNBUFFERED=1
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
      # 登录密码配置（二选一）：
      # 方式1：明文密码（简单但不推荐用于生产环境）
      - APP_LOGIN_PASSWORD=${APP_LOGIN_PASSWORD:-}
      # 方式2：密码哈希（更安全，推荐用于生产环境）
      # 生成哈希：python -c "import bcrypt; print(bcrypt.hashpw('your_password'.encode(), bcrypt.gensalt()).decode())"
      - APP_LOGIN_PASSWORD_HASH=${APP_LOGIN_PASSWORD_HASH:-}
    restart: unless-stopped
    networks:
      - quant-network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex((\"localhost\", 8501)); s.close(); exit(0 if result==0 else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 后台守护进程服务（数据更新 + 模拟交易）
  daemon:
    image: francescoli/quant_ai_dashboard:v0.1.4
    container_name: quant-daemon
    command: python -m core.daemon
    volumes:
      # 本地数据仓库（与 Dashboard 共享）
      - ./data:/app/data
      # 配置文件（与 Dashboard 共享）
      - ./daemon_config.json:/app/daemon_config.json
      - ./daemon_status.json:/app/daemon_status.json
      # 日志目录（与 Dashboard 共享）
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
      # 登录密码配置（与 dashboard 服务保持一致）
      - APP_LOGIN_PASSWORD=${APP_LOGIN_PASSWORD:-}
      - APP_LOGIN_PASSWORD_HASH=${APP_LOGIN_PASSWORD_HASH:-}
    restart: unless-stopped
    networks:
      - quant-network
    depends_on:
      - dashboard

networks:
  quant-network:
    driver: bridge

