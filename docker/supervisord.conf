; ============================================================
; Supervisor 配置 — Quant-AI Dashboard v3.0.0 单容器方案
; 管理 Nginx / Uvicorn / Daemon 三个子进程
; ============================================================

[supervisord]
nodaemon=true
user=root
pidfile=/var/run/supervisord.pid
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=5MB
logfile_backups=1
loglevel=warn
minfds=1024
minprocs=200

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

; ============================================================
; Nginx — 静态文件 + 反向代理
; ============================================================
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
startretries=3
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ============================================================
; Uvicorn — FastAPI 后端（单 worker，并发限制 8）
; ============================================================
[program:uvicorn]
command=python -m uvicorn api.main:app
    --host 0.0.0.0
    --port 8685
    --workers 1
    --limit-concurrency 8
    --lifespan on
    --no-access-log
directory=/app
autostart=true
autorestart=true
startretries=3
startsecs=10
priority=20
stopsignal=TERM
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ============================================================
; Daemon — 定时数据更新 / 模型训练
; 通过 ENABLE_DAEMON=true 环境变量控制是否启动
; ============================================================
[program:daemon]
command=python run_daemon.py
directory=/app
autostart=%(ENV_ENABLE_DAEMON)s
autorestart=true
startretries=3
startsecs=5
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
