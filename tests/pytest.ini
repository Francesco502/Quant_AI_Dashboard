[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --timeout=60
    --strict-markers
    --tb=short
    --disable-warnings
    -m "not e2e_external"
markers =
    unit: unit tests
    integration: integration tests
    performance: performance tests
    slow: slow tests
    e2e: end-to-end tests
    e2e_inprocess: in-process E2E tests using FastAPI TestClient and auth fixtures
    e2e_external: external E2E/release validation tests requiring running services

[coverage:run]
source = core,api
omit =
    */tests/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov